<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Qibla Compass 🕌</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
html, body {
  touch-action: none;
  overflow: hidden;
  height: 100%;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 15px;
}
.header { text-align: center; margin-bottom: 10px; }
.header h1 { font-size: 24px; font-weight: 700; color: #f0c040; }
.header .bismillah { font-size: 18px; color: #c8a850; margin-bottom: 3px; }
.header .subtitle { font-size: 12px; color: #8899bb; margin-top: 3px; }

.compass-wrapper {
  position: relative;
  width: 260px; height: 260px;
  margin: 8px auto;
}
.compass-ring {
  position: absolute; width: 100%; height: 100%;
  border-radius: 50%;
  border: 3px solid rgba(240,192,64,0.3);
  box-shadow: 0 0 30px rgba(240,192,64,0.1), inset 0 0 30px rgba(0,0,0,0.3);
}
.compass-face {
  position: absolute; width: 100%; height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle, #1a2a4a 0%, #0a1628 70%);
}
.dir { position: absolute; font-weight: 700; color: #8899bb; transform: translate(-50%,-50%); }
.dir.n { top: 11%; left: 50%; color: #f04040; font-size: 20px; }
.dir.s { top: 89%; left: 50%; font-size: 16px; }
.dir.e { top: 50%; left: 89%; font-size: 16px; }
.dir.w { top: 50%; left: 11%; font-size: 16px; }

.qibla-needle {
  position: absolute; top: 50%; left: 50%;
  width: 4px; height: 100px;
  margin-left: -2px; margin-top: -100px;
  transform-origin: 50% 100%;
  z-index: 10; pointer-events: none;
}
.qibla-needle::before {
  content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  border-left: 14px solid transparent; border-right: 14px solid transparent;
  border-bottom: 32px solid #f0c040;
  filter: drop-shadow(0 0 8px rgba(240,192,64,0.5));
}
.qibla-needle::after {
  content: '🕋'; position: absolute; top: -26px; left: 50%;
  transform: translateX(-50%); font-size: 20px;
}
.center-dot {
  position: absolute; top: 50%; left: 50%;
  width: 14px; height: 14px; margin: -7px 0 0 -7px;
  border-radius: 50%; background: #f0c040;
  box-shadow: 0 0 10px rgba(240,192,64,0.5);
  z-index: 11; pointer-events: none;
}

.aligned-banner {
  display: none; margin-top: 8px; padding: 10px 16px;
  background: rgba(64,240,64,0.12); border: 1px solid rgba(64,240,64,0.3);
  border-radius: 12px; text-align: center;
  font-size: 15px; color: #40f040; font-weight: 600;
}

.info-panel {
  text-align: center; margin-top: 10px; padding: 10px 18px;
  background: rgba(255,255,255,0.05); border-radius: 14px;
  border: 1px solid rgba(240,192,64,0.15); min-width: 260px;
}
.qibla-deg { font-size: 32px; font-weight: 700; color: #f0c040; }
.qibla-deg span { font-size: 16px; color: #8899bb; }
.qibla-label { font-size: 13px; color: #8899bb; margin-top: 2px; }
.distance { font-size: 12px; color: #667799; margin-top: 6px; }
.heading-display { font-size: 12px; color: #667799; margin-top: 3px; }

.hint {
  margin-top: 10px; padding: 8px 16px;
  background: rgba(240,192,64,0.08); border-radius: 10px;
  border: 1px solid rgba(240,192,64,0.15);
  font-size: 12px; color: #8899bb; text-align: center;
  max-width: 280px; line-height: 1.4;
}
.hint b { color: #f0c040; }

.status { margin-top: 6px; font-size: 11px; color: #667799; text-align: center; }
.status.ok { color: #40c040; }

@keyframes pulse {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(64,240,64,0.5)); }
  50% { filter: drop-shadow(0 0 25px rgba(64,240,64,0.9)); }
}
.qibla-needle.aligned::before { animation: pulse 1.5s infinite; border-bottom-color: #40f040; }
@keyframes glow {
  0%, 100% { box-shadow: 0 0 15px rgba(64,240,64,0.3); }
  50% { box-shadow: 0 0 30px rgba(64,240,64,0.6); }
}
.compass-ring.aligned { border-color: rgba(64,240,64,0.5); animation: glow 1.5s infinite; }
</style>
</head>
<body id="rotateArea">

<div class="header">
  <div class="bismillah">بسم الله الرحمن الرحيم</div>
  <h1>🕌 Qibla Compass</h1>
  <div class="subtitle">Face the direction of the Kaaba</div>
</div>

<div class="compass-wrapper" id="compassCenter">
  <div class="compass-ring" id="compassRing">
    <div class="compass-face">
      <div class="dir n">N</div>
      <div class="dir s">S</div>
      <div class="dir e">E</div>
      <div class="dir w">W</div>
    </div>
  </div>
  <div class="qibla-needle" id="qiblaNeedle"></div>
  <div class="center-dot"></div>
</div>

<div class="aligned-banner" id="alignedBanner">✅ Facing Qibla! 🕋</div>

<div class="info-panel">
  <div class="qibla-deg" id="qiblaDeg">--°</div>
  <div class="qibla-label" id="qiblaLabel">Calculating...</div>
  <div class="distance" id="distanceInfo"></div>
  <div class="heading-display" id="headingDisplay"></div>
</div>

<div class="hint" id="hint"></div>
<div class="status" id="status">Starting...</div>

<script>
const KAABA = { lat: 21.4225, lng: 39.8262 };
let qibla = null, heading = 0, live = false;

// Telegram init
const tg = window.Telegram && Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); try { tg.setHeaderColor('#0a1628'); tg.setBackgroundColor('#0a1628'); } catch(e){} }

function calcQibla(lat, lng) {
  const p1 = lat * Math.PI/180, p2 = KAABA.lat * Math.PI/180;
  const dl = (KAABA.lng - lng) * Math.PI/180;
  return (Math.atan2(Math.sin(dl)*Math.cos(p2), Math.cos(p1)*Math.sin(p2) - Math.sin(p1)*Math.cos(p2)*Math.cos(dl)) * 180/Math.PI + 360) % 360;
}

function distKm(lat, lng) {
  const R = 6371, p1 = lat*Math.PI/180, p2 = KAABA.lat*Math.PI/180;
  const dp = (KAABA.lat-lat)*Math.PI/180, dl = (KAABA.lng-lng)*Math.PI/180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function cardinal(d) {
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
}

function setLoc(lat, lng, label) {
  qibla = calcQibla(lat, lng);
  document.getElementById('qiblaDeg').innerHTML = `${Math.round(qibla)}° <span>${cardinal(qibla)}</span>`;
  document.getElementById('qiblaLabel').textContent = label;
  document.getElementById('distanceInfo').textContent = `🕋 ${Math.round(distKm(lat,lng)).toLocaleString()} km to Makkah`;
  render();
}

function render() {
  if (qibla === null) return;
  const ring = document.getElementById('compassRing');
  const needle = document.getElementById('qiblaNeedle');
  const banner = document.getElementById('alignedBanner');
  ring.style.transform = `rotate(${-heading}deg)`;
  const rel = qibla - heading;
  needle.style.transform = `rotate(${rel}deg)`;
  document.getElementById('headingDisplay').textContent = `Facing: ${Math.round(heading)}° ${cardinal(heading)}`;
  const n = ((rel % 360) + 360) % 360;
  const ok = n < 8 || n > 352;
  needle.classList.toggle('aligned', ok);
  ring.classList.toggle('aligned', ok);
  banner.style.display = ok ? 'block' : 'none';
}

// ===== TOUCH ROTATION (always active as fallback) =====
(function() {
  const el = document.getElementById('compassCenter');
  let startA = null, startH = 0;

  function angle(x, y) {
    const r = el.getBoundingClientRect();
    return Math.atan2(y - r.top - r.height/2, x - r.left - r.width/2) * 180 / Math.PI;
  }

  // Pointer events (works on both touch and mouse)
  document.addEventListener('pointerdown', function(e) {
    // Only start rotation if touching near the compass
    const r = el.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > r.width * 0.9) return; // too far from compass
    
    startA = angle(e.clientX, e.clientY);
    startH = heading;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('pointermove', function(e) {
    if (startA === null) return;
    if (live) return; // don't allow manual when live compass works
    const a = angle(e.clientX, e.clientY);
    heading = (startH - (a - startA) + 360) % 360;
    render();
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('pointerup', function() { startA = null; });
  document.addEventListener('pointercancel', function() { startA = null; });
})();

// ===== LIVE COMPASS METHODS =====
function onHeading(h) {
  if (!live) {
    live = true;
    document.getElementById('hint').innerHTML = '<b>Live compass active!</b> Rotate your phone to find Qibla.';
    document.getElementById('status').textContent = 'Compass sensor ✓';
    document.getElementById('status').className = 'status ok';
  }
  heading = h;
  render();
}

// Method 1: Telegram DeviceOrientation
function tryTelegram() {
  if (!tg || !tg.DeviceOrientation) return false;
  try {
    tg.DeviceOrientation.start({ refresh_rate: 50 });
    tg.onEvent('deviceOrientationChanged', function() {
      const o = tg.DeviceOrientation;
      if (o && o.alpha !== null) onHeading(o.absolute ? (360 - o.alpha) % 360 : o.alpha);
    });
    return true;
  } catch(e) { return false; }
}

// Method 2: Browser DeviceOrientation
function tryBrowser() {
  function handler(e) {
    if (live && startA !== null) return; // manual override
    let h = null;
    if (e.webkitCompassHeading !== undefined) h = e.webkitCompassHeading;
    else if (e.alpha !== null) h = (360 - e.alpha) % 360;
    if (h !== null) onHeading(h);
  }

  // iOS 13+ needs permission from user gesture
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    // We can't auto-request, but we can try
    // The hint will tell user to tap the compass to enable
    document.getElementById('hint').innerHTML = '👆 <b>Swipe the compass</b> to rotate manually, or open in <b>Safari</b> for live compass.';
    
    // Try requesting anyway (might work in some contexts)
    DeviceOrientationEvent.requestPermission().then(function(state) {
      if (state === 'granted') window.addEventListener('deviceorientation', handler, true);
    }).catch(function(){});
    
    return;
  }

  // Android / other — just listen
  window.addEventListener('deviceorientation', handler, true);
}

// ===== INIT =====
// Get location
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    p => setLoc(p.coords.latitude, p.coords.longitude, 'Qibla from your location'),
    () => setLoc(29.7816, -95.734, 'Qibla from Katy, TX (default)'),
    { enableHighAccuracy: true, timeout: 8000 }
  );
} else {
  setLoc(29.7816, -95.734, 'Qibla from Katy, TX (default)');
}

// Try compass methods
tryTelegram();
tryBrowser();

// Fallback message after 3s if no live compass
setTimeout(function() {
  if (!live) {
    document.getElementById('hint').innerHTML = '👆 <b>Swipe the compass</b> to rotate. Align N with north — the 🕋 arrow points to Qibla!';
    document.getElementById('status').textContent = 'Manual mode — swipe to rotate';
  }
}, 3000);
</script>
</body>
</html>
