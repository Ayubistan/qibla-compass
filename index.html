<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Qibla Compass 🕌</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
  color: #fff;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 15px;
  overflow: hidden;
}
.header { text-align: center; margin-bottom: 8px; }
.header h1 { font-size: 24px; font-weight: 700; color: #f0c040; }
.header .bismillah { font-size: 18px; color: #c8a850; margin-bottom: 2px; }

.compass-area {
  width: 280px; height: 280px;
  position: relative;
  margin: 8px auto;
}
.ring {
  position: absolute; width: 100%; height: 100%;
  border-radius: 50%;
  border: 3px solid rgba(240,192,64,0.3);
  box-shadow: 0 0 25px rgba(240,192,64,0.1), inset 0 0 25px rgba(0,0,0,0.3);
  background: radial-gradient(circle, #1a2a4a, #0a1628 70%);
}
.dir-label {
  position: absolute; font-weight: 700; color: #7788aa;
  transform: translate(-50%,-50%);
}
.dir-label.n { top: 11%; left: 50%; color: #ff4444; font-size: 22px; }
.dir-label.s { top: 89%; left: 50%; font-size: 17px; }
.dir-label.e { top: 50%; left: 89%; font-size: 17px; }
.dir-label.w { top: 50%; left: 11%; font-size: 17px; }

.needle {
  position: absolute; top: 50%; left: 50%;
  width: 0; height: 0;
  margin-left: -14px; margin-top: -130px;
  border-left: 14px solid transparent; border-right: 14px solid transparent;
  border-bottom: 40px solid #f0c040;
  filter: drop-shadow(0 0 10px rgba(240,192,64,0.5));
  transform-origin: 14px 130px;
  z-index: 5; pointer-events: none;
}
.needle-icon {
  position: absolute; top: 50%; left: 50%;
  margin-left: -13px; margin-top: -155px;
  font-size: 24px; z-index: 6; pointer-events: none;
  transform-origin: 13px 155px;
}
.dot {
  position: absolute; top: 50%; left: 50%;
  width: 14px; height: 14px; margin: -7px;
  border-radius: 50%; background: #f0c040;
  box-shadow: 0 0 10px rgba(240,192,64,0.5);
  z-index: 7; pointer-events: none;
}

.banner {
  display: none; margin-top: 8px; padding: 10px 18px;
  background: rgba(64,240,64,0.12); border: 1px solid rgba(64,240,64,0.3);
  border-radius: 12px; text-align: center;
  font-size: 16px; color: #40f040; font-weight: 600;
}

.panel {
  text-align: center; margin-top: 10px; padding: 10px 20px;
  background: rgba(255,255,255,0.06); border-radius: 14px;
  border: 1px solid rgba(240,192,64,0.15); width: 280px;
}
.deg { font-size: 34px; font-weight: 700; color: #f0c040; }
.deg span { font-size: 16px; color: #8899bb; }
.label { font-size: 13px; color: #8899bb; margin-top: 1px; }
.dist { font-size: 12px; color: #667799; margin-top: 5px; }
.facing { font-size: 12px; color: #667799; margin-top: 3px; }

.hint {
  margin-top: 8px; font-size: 12px; color: #8899bb;
  text-align: center; line-height: 1.5; max-width: 280px;
}
.hint b { color: #f0c040; }
.hint a { color: #f0c040; text-decoration: underline; }

@keyframes pulse-green {
  0%,100% { filter: drop-shadow(0 0 8px rgba(64,240,64,0.4)); }
  50% { filter: drop-shadow(0 0 22px rgba(64,240,64,0.9)); }
}
.needle.on { border-bottom-color: #40f040; animation: pulse-green 1.5s infinite; }
@keyframes ring-glow {
  0%,100% { border-color: rgba(64,240,64,0.3); }
  50% { border-color: rgba(64,240,64,0.7); }
}
.ring.on { animation: ring-glow 1.5s infinite; }
</style>
</head>
<body>

<div class="header">
  <div class="bismillah">بسم الله الرحمن الرحيم</div>
  <h1>🕌 Qibla Compass</h1>
</div>

<div class="compass-area" id="ca">
  <div class="ring" id="ring">
    <div class="dir-label n">N</div>
    <div class="dir-label s">S</div>
    <div class="dir-label e">E</div>
    <div class="dir-label w">W</div>
  </div>
  <div class="needle" id="needle"></div>
  <div class="needle-icon" id="nicon">🕋</div>
  <div class="dot"></div>
</div>

<div class="banner" id="banner">✅ You are facing the Qibla!</div>

<div class="panel">
  <div class="deg" id="qdeg">--°</div>
  <div class="label" id="qlabel">Locating you...</div>
  <div class="dist" id="qdist"></div>
  <div class="facing" id="qface"></div>
</div>

<button id="startBtn" style="margin-top:10px;padding:14px 30px;background:linear-gradient(135deg,#f0c040,#d4a030);color:#0a1628;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;display:none;">🧭 Start Live Compass</button>
<div class="hint" id="hint">Detecting compass...</div>

<script>
(function(){
  var KAABA_LAT = 21.4225, KAABA_LNG = 39.8262;
  var qibla = null, h = 0, sensorOk = false;

  var tg = window.Telegram && Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); try { tg.setHeaderColor('#0a1628'); } catch(e){} }

  function toRad(d) { return d * Math.PI / 180; }
  function toDeg(r) { return r * 180 / Math.PI; }

  function calcQibla(lat, lng) {
    var p1 = toRad(lat), p2 = toRad(KAABA_LAT), dl = toRad(KAABA_LNG - lng);
    var y = Math.sin(dl) * Math.cos(p2);
    var x = Math.cos(p1)*Math.sin(p2) - Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
    return (toDeg(Math.atan2(y,x)) + 360) % 360;
  }

  function distKm(lat, lng) {
    var R = 6371, p1 = toRad(lat), p2 = toRad(KAABA_LAT);
    var dp = toRad(KAABA_LAT-lat), dl = toRad(KAABA_LNG-lng);
    var a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function card(d) {
    var c = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return c[Math.round(d/22.5) % 16];
  }

  function draw() {
    if (qibla === null) return;
    var ring = document.getElementById('ring');
    var needle = document.getElementById('needle');
    var nicon = document.getElementById('nicon');
    var banner = document.getElementById('banner');
    ring.style.transform = 'rotate(' + (-h) + 'deg)';
    var rel = qibla - h;
    needle.style.transform = 'rotate(' + rel + 'deg)';
    nicon.style.transform = 'rotate(' + rel + 'deg)';
    document.getElementById('qface').textContent = 'Facing: ' + Math.round(h) + '° ' + card(h);
    var n = ((rel % 360) + 360) % 360;
    var ok = n < 8 || n > 352;
    needle.className = 'needle' + (ok ? ' on' : '');
    ring.className = 'ring' + (ok ? ' on' : '');
    banner.style.display = ok ? 'block' : 'none';
  }

  // Location
  function setLoc(lat, lng, lbl) {
    qibla = calcQibla(lat, lng);
    document.getElementById('qdeg').innerHTML = Math.round(qibla) + '° <span>' + card(qibla) + '</span>';
    document.getElementById('qlabel').textContent = lbl;
    document.getElementById('qdist').textContent = '🕋 ' + Math.round(distKm(lat,lng)).toLocaleString() + ' km to Makkah';
    draw();
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(p) { setLoc(p.coords.latitude, p.coords.longitude, 'Qibla from your location'); },
      function() { setLoc(29.7816, -95.734, 'Qibla from Katy, TX'); },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  } else {
    setLoc(29.7816, -95.734, 'Qibla from Katy, TX');
  }

  // ===== SENSOR COMPASS =====
  function onSensor(deg) {
    sensorOk = true;
    h = deg;
    draw();
    document.getElementById('hint').innerHTML = '🧭 <b>Live compass</b> — rotate your phone to find Qibla!';
  }

  // Try Telegram API first
  if (tg && tg.DeviceOrientation) {
    try {
      tg.DeviceOrientation.start({ refresh_rate: 50 });
      tg.onEvent('deviceOrientationChanged', function() {
        var o = tg.DeviceOrientation;
        if (o && o.alpha !== null) onSensor(o.absolute ? (360 - o.alpha) % 360 : o.alpha);
      });
    } catch(e) {}
  }

  // Try browser API
  function onDevOr(e) {
    var deg = null;
    if (e.webkitCompassHeading !== undefined) deg = e.webkitCompassHeading;
    else if (e.alpha !== null) deg = (360 - e.alpha) % 360;
    if (deg !== null) onSensor(deg);
  }

  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS — MUST be triggered by user tap
    var btn = document.getElementById('startBtn');
    btn.style.display = 'block';
    btn.onclick = function() {
      DeviceOrientationEvent.requestPermission().then(function(s) {
        if (s === 'granted') {
          window.addEventListener('deviceorientation', onDevOr, true);
          btn.style.display = 'none';
          document.getElementById('hint').innerHTML = '🧭 <b>Live compass active!</b> Rotate your phone.';
        } else {
          document.getElementById('hint').innerHTML = '❌ Compass permission denied. Check Settings → Safari → Motion & Orientation Access.';
        }
      }).catch(function(e) {
        document.getElementById('hint').innerHTML = '⚠️ Compass not available: ' + e.message;
      });
    };
    document.getElementById('hint').innerHTML = '👆 Tap <b>"Start Live Compass"</b> above to enable rotation!';
  } else {
    window.addEventListener('deviceorientation', onDevOr, true);
  }

  // ===== TOUCH/POINTER MANUAL ROTATION =====
  var ca = document.getElementById('ca');
  var dragging = false, startAngle = 0, startH = 0;

  function getAngle(cx, cy) {
    var r = ca.getBoundingClientRect();
    return toDeg(Math.atan2(cy - r.top - r.height/2, cx - r.left - r.width/2));
  }

  // Touch events (most reliable on mobile)
  ca.ontouchstart = function(e) {
    e.preventDefault();
    var t = e.touches[0];
    dragging = true;
    startAngle = getAngle(t.clientX, t.clientY);
    startH = h;
  };
  ca.ontouchmove = function(e) {
    e.preventDefault();
    if (!dragging || sensorOk) return;
    var t = e.touches[0];
    var a = getAngle(t.clientX, t.clientY);
    h = (startH - (a - startAngle) + 720) % 360;
    draw();
  };
  ca.ontouchend = function() { dragging = false; };
  ca.ontouchcancel = function() { dragging = false; };

  // Mouse events (for desktop testing)
  ca.onmousedown = function(e) {
    dragging = true;
    startAngle = getAngle(e.clientX, e.clientY);
    startH = h;
    e.preventDefault();
  };
  document.onmousemove = function(e) {
    if (!dragging || sensorOk) return;
    var a = getAngle(e.clientX, e.clientY);
    h = (startH - (a - startAngle) + 720) % 360;
    draw();
  };
  document.onmouseup = function() { dragging = false; };

  // Fallback hint after 3 seconds
  setTimeout(function() {
    if (!sensorOk) {
      document.getElementById('hint').innerHTML = 
        '👆 <b>Swipe the compass</b> to rotate it manually.<br>' +
        'For a live compass, open in Safari: <a href="https://ayubistan.github.io/qibla-compass/" target="_blank">tap here</a>';
    }
  }, 3000);

})();
</script>
</body>
</html>
